{% extends 'adminapp/admin_base.html' %}
{% block title %}Edit User | AdminHub{% endblock %}
{% block section_name %}User Identity Management{% endblock %}
{% block page_title %}Edit Profile{% endblock %}

{% block admin_content %}
<style>
    .input-premium {
        background: var(--bg-main) !important;
        border: 1px solid var(--border-color) !important;
        color: var(--text-main) !important;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-premium:focus {
        background: var(--bg-sidebar) !important;
        border-color: var(--primary) !important;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.15) !important;
        outline: none;
    }
</style>

<div class="max-w-4xl">

    <!-- Edit Form -->
    <div class="glass-card p-12 rounded-[3rem] shadow-2xl">
        <form method="POST" class="space-y-10">
            {% csrf_token %}
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                <!-- Username -->
                <div class="space-y-3">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 ml-2">Username</label>
                    <input type="text" name="username" value="{{ user.username }}" required
                           class="w-full px-8 py-5 rounded-2xl input-premium font-bold text-slate-900">
                </div>

                <!-- Email -->
                <div class="space-y-3">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 ml-2">Email Address</label>
                    <input type="email" name="email" value="{{ user.email }}" required
                           class="w-full px-8 py-5 rounded-2xl input-premium font-bold text-slate-900">
                </div>

                <!-- Phone -->
                <div class="space-y-3">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-slate-400 ml-2">Phone Number</label>
                    <input type="text" name="phone" value="{{ user.phone|default:'' }}"
                           class="w-full px-8 py-5 rounded-2xl input-premium font-bold text-slate-900">
                </div>

                <!-- Status Toggles -->
                <div class="flex items-center gap-12 pt-8">
                    <label class="flex items-center gap-4 cursor-pointer group">
                        <input type="checkbox" name="is_verified" {% if user.is_verified %}checked{% endif %}
                               class="w-6 h-6 rounded-lg border-slate-200 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm font-bold text-slate-600 group-hover:text-slate-900 transition-colors uppercase tracking-widest">Verified Account</span>
                    </label>
                </div>
            </div>

            <!-- Footer Actions -->
            <div class="pt-10 border-t border-slate-100 flex items-center justify-between">
                <button type="button" onclick="history.back()" class="text-sm font-bold text-slate-400 hover:text-slate-900 transition-colors uppercase tracking-widest">
                    Cancel Changes
                </button>
                <button type="submit" class="btn-premium px-16 py-6 rounded-2xl text-sm font-black uppercase tracking-[0.2em] shadow-xl">
                    Update User Identity
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
