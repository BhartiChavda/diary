{% extends 'base.html' %}
{% block title %}Reset Identity | MyDiary{% endblock %}
{% block content %}
<div class="flex-1 flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-[3rem] p-6 md:p-12 shadow-2xl border border-slate-100 theme-bg theme-border">
        <div class="mb-10 text-center">
            <div class="w-16 h-16 bg-indigo-50 rounded-2xl flex items-center justify-center mx-auto mb-6 text-indigo-600">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/></svg>
            </div>
            <h3 class="text-3xl font-black text-slate-900 tracking-tight uppercase mb-2 theme-text">Recovery Phase</h3>
            <p class="text-slate-400 text-[10px] font-black uppercase tracking-widest">Enter your email to receive a reset link</p>
        </div>

        <form method="post" class="space-y-8">
            {% csrf_token %}
            <div class="space-y-4">
                <label class="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 ml-1">Email Protocol</label>
                <input type="email" name="email" required
                       class="w-full p-5 rounded-2xl input-premium font-bold tracking-wide"
                       placeholder="name@network.com">
            </div>
            
            <button type="submit" class="w-full btn-premium py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-xs shadow-xl">
                Initiate Reset
            </button>
        </form>

        <div class="mt-10 text-center">
            <a href="{% url 'login' %}" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-indigo-600 transition">Return to Access Point</a>
        </div>
    </div>
</div>
{% endblock %}
