{% extends 'base.html' %}
{% block title %}Identity Restored | NotesHub{% endblock %}
{% block content %}
<div class="flex-1 flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-[3rem] p-12 shadow-2xl border border-slate-100 text-center theme-bg theme-border">
        <div class="w-20 h-20 bg-indigo-600 rounded-[2rem] flex items-center justify-center mx-auto mb-8 text-white shadow-xl shadow-indigo-100">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
        <h3 class="text-3xl font-black text-slate-900 tracking-tight uppercase mb-4 theme-text">Identity Restored</h3>
        <p class="text-slate-500 text-sm font-medium leading-relaxed mb-10">Your secure access credentials have been successfully updated. You can now access your repository with your new password.</p>
        
        <div class="pt-8 border-t border-slate-50 theme-border">
            <a href="{% url 'login' %}" class="btn-premium px-12 py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-[10px] inline-block shadow-xl">
                Login to Workspace
            </a>
        </div>
    </div>
</div>
{% endblock %}
