{% extends 'base.html' %}
{% block title %}Link Dispatched | MyDiary{% endblock %}
{% block content %}
<div class="flex-1 flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-[3rem] p-12 shadow-2xl border border-slate-100 text-center theme-bg theme-border">
        <div class="w-20 h-20 bg-emerald-50 rounded-[2rem] flex items-center justify-center mx-auto mb-8 text-emerald-600">
            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <h3 class="text-3xl font-black text-slate-900 tracking-tight uppercase mb-4 theme-text">Link Dispatched</h3>
        <p class="text-slate-500 text-sm font-medium leading-relaxed mb-10">We've sent recovery protocols to your email. Please check your inbox and follow the secure link provided.</p>
        
        <div class="pt-8 border-t border-slate-50 theme-border">
            <a href="{% url 'login' %}" class="btn-premium px-10 py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-[10px] inline-block shadow-lg">
                Back to Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
